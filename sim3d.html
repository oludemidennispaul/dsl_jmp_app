*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif;}
body{background:#0d1117;color:#e6edf3;overflow:hidden;height:100vh;display:flex;flex-direction:column;}
#tabs{display:flex;background:#161b22;border-bottom:1px solid #30363d;padding:0 10px;flex-shrink:0;}
.tab{padding:9px 13px;cursor:pointer;font-size:11px;font-weight:600;color:#8b949e;border-bottom:2px solid transparent;transition:all .15s;user-select:none;white-space:nowrap;}

#ctrl{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#161b22;border-bottom:1px solid #30363d;flex-shrink:0;flex-wrap:wrap;}
.cbtn{background:#21262d;border:1px solid #30363d;border-radius:5px;color:#c9d1d9;cursor:pointer;font-size:13px;padding:3px 9px;line-height:1;}
.cbtn:hover{background:#30363d;} .cbtn.on{background:#1f6feb;border-color:#388bfd;color:#fff;}
#dateDisp{font-size:13px;font-weight:700;color:#58a6ff;min-width:84px;}
#dayCount{font-size:11px;color:#8b949e;min-width:66px;}
#speedSel{background:#21262d;border:1px solid #30363d;border-radius:5px;color:#c9d1d9;padding:3px 6px;font-size:11px;cursor:pointer;}
.pw{flex:1;min-width:80px;background:#21262d;border-radius:3px;height:4px;cursor:pointer;}
.pf{height:100%;background:linear-gradient(90deg,#1f6feb,#58a6ff);border-radius:3px;}
#ticker{font-size:10px;color:#3fb950;flex:0 0 260px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}

#panels{flex:1;position:relative;overflow:hidden;}
.panel{position:absolute;inset:0;display:none;} .panel.active{display:block;}

#three-canvas{display:block;width:100%;height:100%;}
#mc{display:block;width:100%;height:100%;}

.stock-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.stock-card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:12px;}
.sc-name{font-size:11px;font-weight:700;color:#c9d1d9;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sc-pct{font-size:20px;font-weight:800;margin:2px 0;}
.sc-bar-bg{background:#21262d;border-radius:4px;height:10px;margin:4px 0;position:relative;overflow:hidden;}
.sc-bar-fill{height:100%;border-radius:4px;transition:width .3s;}
.sc-bar-thr{position:absolute;top:0;height:100%;width:2px;background:#ffffff55;}
.sc-nums{display:flex;justify-content:space-between;font-size:10px;color:#6b7280;margin-top:3px;}
.sc-status{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 5px;border-radius:4px;}

const LOCS={
  "Bonny Terminal":   {lon:7.170739,lat:4.451600,label:"Bonny Anchorage"},

const STORAGE_CONFIG={"Chapel_OML24":{cap:270000,thr:70000,color:"#9dc3e6"},"Jasmine S_SOKU":{cap:270000,thr:70000,color:"#3fb950"},"Westmore_Belema":{cap:270000,thr:70000,color:"#f4b183"},"Awoba_OML24":{cap:270000,thr:45000,color:"#e3b341"},"Soku Gas Plant":{cap:75000,thr:10000,color:"#c6e0b4"},"Whisky Star XLV":{cap:98000,thr:80000,color:"#ffe699"},"Dawes Island":{cap:75000,thr:35000,color:"#bdd7ee"},"Barge Starturn":{cap:270000,thr:45000,color:"#e6ccff"},"Asaramatoru":{cap:30000,thr:10000,color:"#7eb8f7"}};

// Draw a storage barge/FPSO shape (wide flat hull, superstructure on top)
function drawStorageVessel(ctx, cx, cy, r, fc, pct, label, stockTxt, isLoading, loadPulse) {
  const w=r*2.4, h=r*1.1;
  ctx.save();
  // Hull shadow
  ctx.beginPath();
  ctx.ellipse(cx+2, cy+3, w/2, h/2.2, 0, 0, Math.PI*2);
  ctx.fillStyle="rgba(0,0,0,0.3)"; ctx.fill();
  // Main hull (wide flat barge shape)
  ctx.beginPath();
  ctx.moveTo(cx-w/2+r*0.3, cy-h/2);
  ctx.lineTo(cx+w/2-r*0.3, cy-h/2);
  ctx.quadraticCurveTo(cx+w/2+r*0.2, cy, cx+w/2-r*0.3, cy+h/2);
  ctx.lineTo(cx-w/2+r*0.3, cy+h/2);
  ctx.quadraticCurveTo(cx-w/2-r*0.2, cy, cx-w/2+r*0.3, cy-h/2);
  ctx.closePath();
  ctx.fillStyle="#111827"; ctx.fill();
  ctx.strokeStyle=fc; ctx.lineWidth=2.5; ctx.stroke();
  // Fill level
  if(pct>0){
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cx-w/2+r*0.3, cy-h/2);
    ctx.lineTo(cx+w/2-r*0.3, cy-h/2);
    ctx.quadraticCurveTo(cx+w/2+r*0.2, cy, cx+w/2-r*0.3, cy+h/2);
    ctx.lineTo(cx-w/2+r*0.3, cy+h/2);
    ctx.quadraticCurveTo(cx-w/2-r*0.2, cy, cx-w/2+r*0.3, cy-h/2);
    ctx.closePath();
    ctx.clip();
    const fillY = cy+h/2 - pct*h;
    ctx.fillStyle=fc+"66"; ctx.fillRect(cx-w/2-r*0.2, fillY, w+r*0.4, h);
    ctx.restore();
  }
  // Small superstructure box on top
  ctx.fillStyle="#1e2a3a";
  ctx.fillRect(cx-r*0.5, cy-h/2-r*0.5, r, r*0.5);
  ctx.strokeStyle=fc+"88"; ctx.lineWidth=1.2;
  ctx.strokeRect(cx-r*0.5, cy-h/2-r*0.5, r, r*0.5);
  // Loading pulse ring
  if(isLoading){
    const p2=loadPulse;
    ctx.beginPath(); ctx.ellipse(cx,cy, w/2+4+p2*6, h/2+4+p2*4, 0,0,Math.PI*2);
    ctx.strokeStyle=`rgba(63,185,80,${0.2+p2*0.35})`; ctx.lineWidth=2; ctx.stroke();
  }
  // Stock text
  if(stockTxt){
    ctx.font="bold 11px sans-serif"; ctx.fillStyle=fc; ctx.textAlign="center";
    ctx.fillText(stockTxt, cx, cy+4);
  }
  // Label below
  ctx.font="bold 11px sans-serif"; ctx.fillStyle="#c9d1d9"; ctx.textAlign="center";
  ctx.fillText(label, cx, cy+h/2+r*0.5+14);
  ctx.restore();
}

// Draw a mother/tanker ship (pointed bow, flat stern, superstructure aft)
function drawMotherVessel(ctx, cx, cy, col, pct, name, stockTxt, state, flashAlpha) {
  const w=90, h=32;
  ctx.save();
  // Shadow
  ctx.beginPath(); drawShipHull(ctx, cx+2, cy+3, w, h);
  ctx.fillStyle="rgba(0,0,0,0.4)"; ctx.fill();
  // Hull
  ctx.beginPath(); drawShipHull(ctx, cx, cy, w, h);
  ctx.fillStyle="#1c2840"; ctx.fill();
  // Fill bar
  ctx.save();
  ctx.beginPath(); drawShipHull(ctx, cx, cy, w, h); ctx.clip();
  const fc=pct>0.95?"#f85149":pct>0.7?"#e3b341":"#1f6feb";
  ctx.fillStyle=fc+"66"; ctx.fillRect(cx-w/2+3, cy-h/2+3, (w-6)*pct, h-6);
  ctx.restore();
  // Outline
  ctx.beginPath(); drawShipHull(ctx, cx, cy, w, h);
  ctx.strokeStyle=col; ctx.lineWidth=(state==="discharging_sbm"||flashAlpha>0.1)?3:2; ctx.stroke();
  // Superstructure (bridge) aft
  ctx.fillStyle="#2a3a55";
  ctx.fillRect(cx+w/2-22, cy-h/2-8, 18, 10);
  ctx.strokeStyle=col+"99"; ctx.lineWidth=1; ctx.strokeRect(cx+w/2-22, cy-h/2-8, 18, 10);
  // Flash overlay
  if(flashAlpha>0){
    ctx.beginPath(); drawShipHull(ctx, cx, cy, w, h);
    ctx.fillStyle=`rgba(255,240,80,${flashAlpha*0.4})`; ctx.fill();
  }
  // SBM discharge glow
  if(state==="discharging_sbm"){
    ctx.beginPath(); drawShipHull(ctx, cx+0, cy, w+10, h+10);
    const pulse=0.5+0.5*Math.sin(Date.now()*0.005);
    ctx.strokeStyle=`rgba(255,165,0,${0.4+pulse*0.4})`; ctx.lineWidth=3; ctx.stroke();
  }
  // State label
  const slbl={departing:"→SBM3",at_sbm:"atSBM3",discharging_sbm:"⬇DISCH",returning:"←Bonny"}[state]||"";
  if(slbl){ctx.font="bold 8px sans-serif";ctx.fillStyle=col;ctx.textAlign="center";ctx.fillText(slbl,cx,cy-h/2-12);}
  // Name + stock
  ctx.font="bold 11px sans-serif"; ctx.fillStyle="#e6edf3"; ctx.textAlign="center";
  ctx.fillText(name, cx, cy+4);
  if(stockTxt){ctx.font="9px sans-serif";ctx.fillStyle="#8b949e";ctx.fillText(stockTxt,cx,cy+16);}
  ctx.restore();
}

function drawShipHull(ctx, cx, cy, w, h) {
  // Pointed bow (right), flat stern (left), gentle curves
  ctx.moveTo(cx-w/2+6, cy-h/2);
  ctx.lineTo(cx+w/2-14, cy-h/2);
  ctx.quadraticCurveTo(cx+w/2+6, cy, cx+w/2-14, cy+h/2);
  ctx.lineTo(cx-w/2+6, cy+h/2);
  ctx.quadraticCurveTo(cx-w/2-4, cy, cx-w/2+6, cy-h/2);
  ctx.closePath();
}

// Draw a shuttle vessel (smaller, faster-looking, pointed both ends)
function drawShuttleVessel(ctx, cx, cy, col, size, angle, label) {
  ctx.save();
  ctx.translate(cx, cy);
  if(angle !== undefined) ctx.rotate(angle);
  const w=size*2.8, h=size*1.0;
  // Shadow
  ctx.beginPath(); drawShuttleHull(ctx, 2, 3, w, h);
  ctx.fillStyle="rgba(0,0,0,0.3)"; ctx.fill();
  // Hull
  ctx.beginPath(); drawShuttleHull(ctx, 0, 0, w, h);
  ctx.fillStyle=col; ctx.fill();
  ctx.strokeStyle="#fff"; ctx.lineWidth=1.5; ctx.stroke();
  // Small cabin
  ctx.fillStyle="#fff4"; ctx.fillRect(-3, -h/2+1, 6, h/3);
  ctx.restore();
  if(label){
    ctx.font="bold 9px sans-serif"; ctx.fillStyle=col;
    ctx.textAlign="center"; ctx.fillText(label, cx, cy-size-6);
  }
}

function drawShuttleHull(ctx, ox, oy, w, h) {
  // Pointed bow and stern (elongated diamond-ish)
  ctx.moveTo(ox+w/2, oy);
  ctx.quadraticCurveTo(ox+w/3, oy-h/2, ox, oy-h/2);
  ctx.quadraticCurveTo(ox-w/3, oy-h/2, ox-w/2, oy);
  ctx.quadraticCurveTo(ox-w/3, oy+h/2, ox, oy+h/2);
  ctx.quadraticCurveTo(ox+w/3, oy+h/2, ox+w/2, oy);
  ctx.closePath();
}

// Draw Bonny Anchorage (terminal / jetty shape)
function drawBonnyTerminal(ctx, cx, cy) {
  ctx.save();
  // Outer ring
  ctx.beginPath(); ctx.arc(cx, cy, 26, 0, Math.PI*2);
  ctx.fillStyle="#131f32"; ctx.fill();
  ctx.strokeStyle="#58a6ff"; ctx.lineWidth=3; ctx.stroke();
  // Inner platform (octagon)
  ctx.beginPath();
  for(let i=0;i<8;i++){const a=i*Math.PI/4-Math.PI/8;ctx.lineTo(cx+18*Math.cos(a),cy+18*Math.sin(a));}
  ctx.closePath(); ctx.fillStyle="#1a2840"; ctx.fill();
  ctx.strokeStyle="#58a6ff88"; ctx.lineWidth=1; ctx.stroke();
  // Jetty arms
  [[0,-26],[0,26],[-26,0],[26,0]].forEach(([dx,dy])=>{
    ctx.beginPath(); ctx.moveTo(cx+dx*0.55,cy+dy*0.55);
    ctx.lineTo(cx+dx*0.9,cy+dy*0.9);
    ctx.strokeStyle="#58a6ff66"; ctx.lineWidth=3; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx+dx*0.9,cy+dy*0.9,3,0,Math.PI*2);
    ctx.fillStyle="#58a6ff"; ctx.fill();
  });
  // Anchor symbol
  ctx.font="bold 16px sans-serif"; ctx.fillStyle="#58a6ff";
  ctx.textAlign="center"; ctx.fillText("⚓", cx, cy+5);
  ctx.restore();
}

// Draw SanJulian roving storage (distinctive teal vessel)
function drawSanJulian(ctx, cx, cy, pct, isReceiving, isTransloading, nodeR, ringR, pulse) {
  ctx.save();
  // Outer glow ring
  ctx.beginPath(); ctx.arc(cx, cy, ringR, 0, Math.PI*2);
  ctx.strokeStyle=isReceiving?`rgba(15,200,224,${0.4+pulse*0.4})`:isTransloading?`rgba(255,165,0,${0.4+pulse*0.4})`:`rgba(15,76,92,${0.15+pct*0.25})`;
  ctx.lineWidth=isReceiving||isTransloading?2.5:1.5; ctx.stroke();
  // Vessel body — elongated storage shape
  const w=nodeR*2.8, hh=nodeR*1.2;
  ctx.beginPath();
  ctx.moveTo(cx-w/2+4, cy-hh/2);
  ctx.lineTo(cx+w/2-4, cy-hh/2);
  ctx.quadraticCurveTo(cx+w/2+4, cy, cx+w/2-4, cy+hh/2);
  ctx.lineTo(cx-w/2+4, cy+hh/2);
  ctx.quadraticCurveTo(cx-w/2-4, cy, cx-w/2+4, cy-hh/2);
  ctx.closePath();
  ctx.fillStyle=isReceiving?"#0a2830":isTransloading?"#1a1a00":"#0a1628"; ctx.fill();
  ctx.strokeStyle=isReceiving?"#60c8e0":isTransloading?"#ffa500":"#0F4C5C"; ctx.lineWidth=2.5; ctx.stroke();
  // Fill level
  if(pct>0){
    ctx.save(); ctx.beginPath();
    ctx.moveTo(cx-w/2+4, cy-hh/2); ctx.lineTo(cx+w/2-4, cy-hh/2);
    ctx.quadraticCurveTo(cx+w/2+4, cy, cx+w/2-4, cy+hh/2);
    ctx.lineTo(cx-w/2+4, cy+hh/2); ctx.quadraticCurveTo(cx-w/2-4, cy, cx-w/2+4, cy-hh/2);
    ctx.closePath(); ctx.clip();
    const fillY=cy+hh/2-pct*hh;
    ctx.fillStyle=isTransloading?"#ffa50055":"#0F4C5C88";
    ctx.fillRect(cx-w/2-4, fillY, w+8, hh);
    ctx.restore();
  }
  // SJ text
  ctx.font="bold 11px sans-serif"; ctx.fillStyle="#60c8e0"; ctx.textAlign="center";
  ctx.fillText("SJ", cx, cy+4);
  ctx.restore();
}

const MIN_LON=6.35,MAX_LON=7.39,MIN_LAT=4.31,MAX_LAT=4.87;
function px(lon,W){return((lon-MIN_LON)/(MAX_LON-MIN_LON))*W;}
function py(lat,H){return H-((lat-MIN_LAT)/(MAX_LAT-MIN_LAT))*H;}
function lerp(a,b,t){return a+(b-a)*t;}
let day=0,playing=true,spd=1,lastT=0,activeP="map-panel",tick=0;
const mFlash={};MOTHERS.forEach(m=>mFlash[m]=0);
const mSt={};MOTHERS.forEach(m=>{const b=MBERTH[m]||{lon:7.17,lat:4.45};mSt[m]={state:"filling",x:0,y:0,tx:0,ty:0,bLon:b.lon,bLat:b.lat};});
const SBM_D={};SBM.forEach(ev=>{(SBM_D[ev.ullage]||=[]).push({...ev,phase:"departing"});(SBM_D[ev.trip]||=[]).push({...ev,phase:"at_sbm"});(SBM_D[ev.discharge]||=[]).push({...ev,phase:"discharging_sbm"});(SBM_D[ev.ret]||=[]).push({...ev,phase:"returning"});});
const SS={};SHUTTLES.forEach(s=>{SS[s]={state:"idle",x:0,y:0,tx:0,ty:0,col:SCOLS[s]||"#aaa",storage:"",mother:"",vis:false,ph:Math.random()*Math.PI*2};});
document.querySelectorAll(".tab").forEach(t=>{t.addEventListener("click",()=>{document.querySelectorAll(".tab,.panel").forEach(x=>x.classList.remove("active"));t.classList.add("active");activeP=t.dataset.p;document.getElementById(activeP).classList.add("active");resizeAll();initPos();renderFrame();if(activeP==="tank-panel"){initThree();animThree();}});});
const bPlay=document.getElementById("bPlay");
document.getElementById("bReset").onclick=()=>{day=0;playing=false;bPlay.textContent="▶";bPlay.classList.remove("on");updateDay(0);renderFrame();};
bPlay.onclick=()=>{playing=!playing;bPlay.textContent=playing?"⏸":"▶";bPlay.classList.toggle("on",playing);if(playing)requestAnimationFrame(loop);};
document.getElementById("speedSel").onchange=e=>spd=+e.target.value;

/* ========== THREE.JS 3D TANKS ========== */
let scene,cam,rend,threeInited=false,threeRunning=false;
const tankMeshes={},tankLiqMat={},tankPctTex={},tankPctCanvas={};
function initThree(){
  if(threeInited)return;threeInited=true;
  const cv=document.getElementById("three-canvas");
  // Panel may be hidden (0 size) — use window dimensions as fallback
  const panel=document.getElementById("tank-panel");
  const W=panel.offsetWidth||cv.parentElement.clientWidth||window.innerWidth||900;
  const H=panel.offsetHeight||cv.parentElement.clientHeight||(window.innerHeight-80)||500;
  scene=new THREE.Scene();scene.background=new THREE.Color(0x0d1117);scene.fog=new THREE.Fog(0x0d1117,40,90);
  cam=new THREE.PerspectiveCamera(45,W/H,0.1,200);cam.position.set(0,14,28);cam.lookAt(0,4,0);
  rend=new THREE.WebGLRenderer({canvas:cv,antialias:true});rend.setSize(W,H);rend.setPixelRatio(Math.min(window.devicePixelRatio,2));rend.shadowMap.enabled=true;
  scene.add(new THREE.AmbientLight(0x223355,1.2));
  const dl=new THREE.DirectionalLight(0xffffff,1.4);dl.position.set(10,20,10);dl.castShadow=true;scene.add(dl);
  [[0xef5350,-8],[0xff9800,0],[0x42a5f5,8]].forEach(([c,ox])=>{const pl=new THREE.PointLight(c,0.7,22);pl.position.set(ox,8,4);scene.add(pl);});
  scene.add(new THREE.GridHelper(50,25,0x1f2937,0x1f2937));
  const sp=9,sx=-((MOTHERS.length-1)*sp)/2;
  MOTHERS.forEach((m,i)=>{

      const sjX2=px(SANJULIAN_POS.lon,W),sjY2=py(SANJULIAN_POS.lat,H);
      const p2=0.5+0.5*Math.sin(tick*0.18+st.ph);
      mCtx.beginPath();mCtx.arc(sjX2,sjY2,10+p2*5,0,Math.PI*2);mCtx.strokeStyle=`rgba(15,200,224,${0.3+p2*0.4})`;mCtx.lineWidth=2;mCtx.stroke();
      mCtx.beginPath();mCtx.arc(sjX2,sjY2,7,0,Math.PI*2);mCtx.fillStyle="#0F4C5C";mCtx.fill();mCtx.strokeStyle="#60c8e0";mCtx.lineWidth=2;mCtx.stroke();
      mCtx.font="8px sans-serif";mCtx.fillStyle="#60c8e0";mCtx.textAlign="center";mCtx.fillText(s,sjX2,sjY2-12);
      mCtx.font="bold 7px sans-serif";mCtx.fillStyle="#60c8e0";mCtx.fillText("→SJ",sjX2,sjY2+19);
    }else if(st.state==="sts_discharging"){
      // STS consolidated discharge — double-ring gold effect at mother
      const mb2=MBERTH[st.mother];
      const tsx=mb2?px(mb2.lon,W):sx, tsy=mb2?py(mb2.lat,H):sy;
      const p2=0.5+0.5*Math.sin(tick*0.2+st.ph);
      mCtx.beginPath();mCtx.arc(tsx,tsy,13+p2*4,0,Math.PI*2);mCtx.strokeStyle=`rgba(255,215,0,${0.3+p2*0.3})`;mCtx.lineWidth=2;mCtx.stroke();
      mCtx.beginPath();mCtx.arc(tsx,tsy,7,0,Math.PI*2);mCtx.fillStyle=col;mCtx.fill();mCtx.strokeStyle="#ffd700";mCtx.lineWidth=2.5;mCtx.stroke();
      mCtx.beginPath();mCtx.arc(tsx,tsy,4,0,Math.PI*2);mCtx.fillStyle="#ffd700";mCtx.fill();
      mCtx.font="8px sans-serif";mCtx.fillStyle=col;mCtx.textAlign="center";mCtx.fillText(s,tsx,tsy-13);
      mCtx.font="bold 7px sans-serif";mCtx.fillStyle="#ffd700";mCtx.fillText("STS",tsx,tsy+19);
    }else{mCtx.beginPath();mCtx.arc(sx,sy,4,0,Math.PI*2);mCtx.fillStyle=col+"33";mCtx.fill();mCtx.strokeStyle=col+"55";mCtx.lineWidth=1;mCtx.stroke();}
  });
  /* Scale + compass */
  const bw2=50/110.7*(W/(MAX_LON-MIN_LON)),bx2=14,by2=H-18;mCtx.strokeStyle="#6b7280";mCtx.lineWidth=1.5;mCtx.beginPath();mCtx.moveTo(bx2,by2);mCtx.lineTo(bx2+bw2,by2);mCtx.stroke();mCtx.beginPath();mCtx.moveTo(bx2,by2-4);mCtx.lineTo(bx2,by2+4);mCtx.stroke();mCtx.beginPath();mCtx.moveTo(bx2+bw2,by2-4);mCtx.lineTo(bx2+bw2,by2+4);mCtx.stroke();mCtx.font="9px sans-serif";mCtx.fillStyle="#6b7280";mCtx.textAlign="left";mCtx.fillText("50 km",bx2,by2-7);
  const crX=22,crY=50,crR=14;["N","E","S","W"].forEach((dir,i)=>{const a=i*Math.PI/2-Math.PI/2,ex=crX+Math.cos(a)*crR,ey=crY+Math.sin(a)*crR;mCtx.strokeStyle=dir==="N"?"#58a6ff":"#374151";mCtx.lineWidth=dir==="N"?2:1.2;mCtx.beginPath();mCtx.moveTo(crX,crY);mCtx.lineTo(ex,ey);mCtx.stroke();mCtx.font=dir==="N"?"bold 9px sans-serif":"8px sans-serif";mCtx.fillStyle=dir==="N"?"#58a6ff":"#6b7280";mCtx.textAlign="center";mCtx.fillText(dir,ex+Math.cos(a)*8,ey+Math.sin(a)*8+3);});
  const leg=[{c:"#3fb950",t:"Loading"},{c:"#fff",t:"Transit"},{c:"#555",t:"Return"},{c:"#ffd700",t:"SBM3"},{c:"#ffa500",t:"@ SBM"},{c:"#60c8e0",t:"SanJulian"}];
  let lly=H-8;mCtx.textAlign="left";mCtx.font="9px sans-serif";leg.slice().reverse().forEach(({c,t})=>{mCtx.fillStyle=c;mCtx.fillRect(W-130,lly-8,8,8);mCtx.fillStyle="#6b7280";mCtx.fillText(t,W-118,lly);lly-=13;});

  // ── Whisky Star XLV callout (bottom-right, since it's 80km east of map bounds) ──
  {const wx=W-64,wy=H-96,wr=20;
  const wstg=d.storages&&d.storages["Whisky Star XLV"];const wPct=wstg?Math.min(wstg.stock/98000,1):0;
  const wCol=wstg&&wstg.stock<80000?"#3fb950":wPct>0.9?"#f85149":"#ffe699";
  // Whisky loading pulse
  if(SHUTTLES.some(s=>SS[s].state==="loading"&&SS[s].storage==="Whisky Star XLV")){
    const p2=0.5+0.5*Math.sin(tick*0.12);mCtx.beginPath();mCtx.arc(wx,wy,wr+5+p2*4,0,Math.PI*2);mCtx.strokeStyle=`rgba(63,185,80,${0.2+p2*0.3})`;mCtx.lineWidth=1.5;mCtx.stroke();}
  // Node
  mCtx.beginPath();mCtx.arc(wx,wy,wr,0,Math.PI*2);mCtx.fillStyle="#0d1a1a";mCtx.fill();mCtx.strokeStyle=wCol;mCtx.lineWidth=2;mCtx.stroke();
  if(wPct>0){mCtx.beginPath();mCtx.moveTo(wx,wy);mCtx.arc(wx,wy,wr-2,-Math.PI/2,-Math.PI/2+wPct*Math.PI*2);mCtx.closePath();mCtx.fillStyle=wCol+"55";mCtx.fill();}
  if(wstg){mCtx.font="bold 9px sans-serif";mCtx.fillStyle=wCol;mCtx.textAlign="center";mCtx.fillText((wstg.stock/1000).toFixed(0)+"k",wx,wy+3);}
  // Label with "far east" indicator
  mCtx.font="bold 9px sans-serif";mCtx.fillStyle="#ffe699";mCtx.textAlign="center";mCtx.fillText("Whisky Star XLV",wx,wy-wr-6);
  mCtx.font="8px sans-serif";mCtx.fillStyle="#6b7280";mCtx.fillText("(~80km east →)",wx,wy+wr+12);
  // Dashed arrow pointing east to indicate it's off-map
  mCtx.strokeStyle="#ffe69966";mCtx.lineWidth=1;mCtx.setLineDash([3,4]);
  mCtx.beginPath();mCtx.moveTo(wx+wr,wy);mCtx.lineTo(wx+wr+18,wy);mCtx.stroke();
  mCtx.setLineDash([]);mCtx.fillStyle="#ffe699";
  mCtx.beginPath();mCtx.moveTo(wx+wr+20,wy);mCtx.lineTo(wx+wr+14,wy-3);mCtx.lineTo(wx+wr+14,wy+3);mCtx.closePath();mCtx.fill();}
}

/* ========== GANTT ========== */
const gc=document.getElementById("gc"),gCtx=gc.getContext("2d");
const GR=24,GL=135,GT=36;
const SBM_DS={};MOTHERS.forEach(m=>{SBM_DS[m]={departing:new Set(),at_sbm:new Set(),discharging:new Set(),returning:new Set()};});SBM.forEach(ev=>{SBM_DS[ev.mother].departing.add(ev.ullage);SBM_DS[ev.mother].at_sbm.add(ev.trip);SBM_DS[ev.mother].discharging.add(ev.discharge);SBM_DS[ev.mother].returning.add(ev.ret);});
function resizeGantt(){
  const p=document.getElementById("gantt-panel");
  gc.width=p.offsetWidth||900;
  gc.height=GT+(MOTHERS.length+SHUTTLES.length+2)*GR+16;
  gc.style.width="100%";gc.style.height=gc.height+"px";
}
function drawGantt(di){
  const W=gc.width,H=gc.height,dw=(W-GL)/ND;gCtx.clearRect(0,0,W,H);gCtx.fillStyle="#0d1117";gCtx.fillRect(0,0,W,H);
  for(let d=0;d<ND;d+=7){gCtx.fillStyle="rgba(255,255,255,0.02)";gCtx.fillRect(GL+d*dw,0,dw*7,H);}
  gCtx.font="bold 9px sans-serif";let lm="";for(let d=0;d<ND;d++){const mon=DAILY[d].date.slice(0,7);if(mon!==lm){const x=GL+d*dw;gCtx.fillStyle="#6b7280";gCtx.textAlign="left";gCtx.fillText(DAILY[d].date.slice(0,7),x+3,14);gCtx.strokeStyle="rgba(255,255,255,0.08)";gCtx.lineWidth=1;gCtx.beginPath();gCtx.moveTo(x,0);gCtx.lineTo(x,H);gCtx.stroke();lm=mon;}}
  MOTHERS.forEach((m,ri)=>{const y=GT+ri*GR,mc2=MCOLS[m]||"#aaa";gCtx.fillStyle=ri%2===0?"#0d1117":"#0f1620";gCtx.fillRect(0,y,W,GR);gCtx.fillStyle=mc2;gCtx.font="bold 9px sans-serif";gCtx.textAlign="right";gCtx.fillText(m,GL-4,y+GR/2+3);
    for(let d=0;d<ND;d++){const ds=DAILY[d].date,x=GL+d*dw,bw=Math.max(dw-0.5,1.2);const ms2=DAILY[d].mothers[m];const pct=ms2?ms2.stock/ms2.cap:0;
      if(SBM_DS[m].departing.has(ds)){gCtx.fillStyle="#d4a017";gCtx.fillRect(x+0.3,y+4,bw,GR-8);}else if(SBM_DS[m].at_sbm.has(ds)){gCtx.fillStyle="#f59e0b";gCtx.fillRect(x+0.3,y+4,bw,GR-8);}else if(SBM_DS[m].discharging.has(ds)){gCtx.fillStyle="#ff6b00";gCtx.fillRect(x+0.3,y+4,bw,GR-8);}else if(SBM_DS[m].returning.has(ds)){gCtx.fillStyle="#84cc16";gCtx.fillRect(x+0.3,y+4,bw,GR-8);}else if(pct>0){const fc2=pct>0.95?"#f85149":pct>0.7?"#e3b341":"#1f6feb";gCtx.fillStyle=fc2+"55";gCtx.fillRect(x+0.3,y+GR-7,(bw)*pct,3);}
    }gCtx.strokeStyle="rgba(255,255,255,0.05)";gCtx.lineWidth=1;gCtx.beginPath();gCtx.moveTo(0,y+GR);gCtx.lineTo(W,y+GR);gCtx.stroke();
  });
  const sy2=GT+MOTHERS.length*GR;gCtx.fillStyle="#1f2937";gCtx.fillRect(0,sy2,W,18);gCtx.fillStyle="#58a6ff";gCtx.font="bold 9px sans-serif";gCtx.textAlign="left";gCtx.fillText("SHUTTLE VESSELS",4,sy2+12);
  SHUTTLES.forEach((s,ri)=>{const y=sy2+18+ri*GR,col=SCOLS[s]||"#aaa";gCtx.fillStyle=ri%2===0?"#0d1117":"#0f1620";gCtx.fillRect(0,y,W,GR);gCtx.fillStyle=col;gCtx.font="bold 9px sans-serif";gCtx.textAlign="right";gCtx.fillText(s,GL-4,y+GR/2+3);
    for(let d=0;d<ND;d++){const rec=DAILY[d],ds=rec.date,x=GL+d*dw,bw=Math.max(dw-0.5,1.2);const tl=STL[s]&&STL[s][ds];const dd=rec.discharges.find(dd=>dd.shuttle===s);const tr=rec.transit_names&&rec.transit_names.includes(s);
      if(tl&&tl.state==="loading"){gCtx.fillStyle="#3fb950";gCtx.fillRect(x+0.3,y+4,bw,GR-8);}else if(tl&&tl.state==="transit_loaded"){gCtx.fillStyle=col+"77";gCtx.fillRect(x+0.3,y+9,bw,GR-18);}else if(tl&&tl.state==="returning"){gCtx.fillStyle="#374151";gCtx.fillRect(x+0.3,y+11,bw,GR-22);}else if(dd){gCtx.fillStyle=MCOLS[dd.mother]||"#aaa";gCtx.fillRect(x+0.3,y+4,bw,GR-8);}else if(tr){gCtx.fillStyle=col+"33";gCtx.fillRect(x+0.3,y+9,bw,GR-18);}
    }gCtx.strokeStyle="rgba(255,255,255,0.04)";gCtx.lineWidth=1;gCtx.beginPath();gCtx.moveTo(0,y+GR);gCtx.lineTo(W,y+GR);gCtx.stroke();
  });
  const tx=GL+di*dw;gCtx.strokeStyle="rgba(240,246,252,0.8)";gCtx.lineWidth=1.5;gCtx.setLineDash([4,3]);gCtx.beginPath();gCtx.moveTo(tx,0);gCtx.lineTo(tx,H);gCtx.stroke();gCtx.setLineDash([]);
}

/* ========== STATE UPDATE ========== */
function initPos(){const W=mc.width,H=mc.height;MOTHERS.forEach(m=>{const s=mSt[m];s.x=px(s.bLon,W);s.y=py(s.bLat,H);s.tx=s.x;s.ty=s.y;});SHUTTLES.forEach(s=>{const st=SS[s];const b=LOCS["Bonny Terminal"];st.x=px(b.lon,W);st.y=py(b.lat,H);st.tx=st.x;st.ty=st.y;});}
function updateDay(di){
  if(di<0||di>=ND)return;const rec=DAILY[di],ds=rec.date;const W=mc.width,H=mc.height;const sbmToday=SBM_D[ds]||[];
  MOTHERS.forEach(m=>{const st=mSt[m];const bX=px(st.bLon,W),bY=py(st.bLat,H);const sbX=px(SBM3.lon,W),sbY=py(SBM3.lat,H);const ev=sbmToday.find(e=>e.mother===m);
    if(ev){st.state=ev.phase;if(ev.phase==="departing"){st.tx=lerp(bX,sbX,0.5);st.ty=lerp(bY,sbY,0.5);mFlash[m]=0.6;}else if(ev.phase==="at_sbm"){st.tx=lerp(bX,sbX,0.85);st.ty=lerp(bY,sbY,0.85);}else if(ev.phase==="discharging_sbm"){st.tx=sbX;st.ty=sbY;mFlash[m]=1.0;}else if(ev.phase==="returning"){st.tx=bX;st.ty=bY;}}
    else{if(st.state==="returning"||st.state==="filling"){st.state="filling";st.tx=bX;st.ty=bY;}}if(di===0){st.x=st.tx;st.y=st.ty;}
  });
  SHUTTLES.forEach(s=>{
    const st=SS[s];st.vis=true;const bX=px(LOCS["Bonny Terminal"].lon,W),bY=py(LOCS["Bonny Terminal"].lat,H);const tl=STL[s]&&STL[s][ds];const dd=rec.discharges.find(d=>d.shuttle===s);
    if(tl&&tl.state==="loading"){st.state="loading";st.storage=tl.storage;const tloc=LOCS[tl.storage];st.tx=tloc?px(tloc.lon,W):bX;st.ty=tloc?py(tloc.lat,H):bY;st.x=st.tx;st.y=st.ty;}
    else if(tl&&tl.state==="transit_loaded"){st.state="transit_loaded";st.tx=bX;st.ty=bY;}
    else if(tl&&tl.state==="returning"){st.state="returning";const rloc=LOCS[tl.storage];st.tx=rloc?px(rloc.lon,W):bX;st.ty=rloc?py(rloc.lat,H):bY;}
    else if(dd){st.state="discharging";st.mother=dd.mother;mFlash[dd.mother]=1.0;const mb=MBERTH[dd.mother];if(mb){st.tx=px(mb.lon,W)+(Math.random()-0.5)*10;st.ty=py(mb.lat,H)+(Math.random()-0.5)*10;}else{st.tx=bX;st.ty=bY;}}
    else{st.state="idle";st.tx=bX+(Math.random()-0.5)*18;st.ty=bY+(Math.random()-0.5)*18;}
    if(di===0){st.x=st.tx;st.y=st.ty;}
  });
  document.getElementById("dateDisp").textContent=ds;document.getElementById("dayCount").textContent="Day "+(di+1)+"/"+ND;document.getElementById("pf").style.width=((di+1)/ND*100)+"%";
  // Mark STS and SanJulian vessel states for rendering
  (rec.sj_receives||[]).forEach(e=>{if(SS[e.shuttle]){SS[e.shuttle].state="sj_discharging";}mFlash["SanJulian"]=1.0;});
  (rec.sj_transfers||[]).forEach(e=>{if(MOTHERS.includes(e.mother))mFlash[e.mother]=1.0;});
  (rec.sts_events||[]).forEach(e=>{if(SS[e.shuttle]){SS[e.shuttle].state="sts_discharging";SS[e.shuttle].mother=e.mother;}});
  const evts=[];
  rec.loads.forEach(l=>{const lt=SLT[l.storage]||1;evts.push("📦 "+l.shuttle+"→"+(l.storage||"").replace(/_/g," ")+" ("+lt+"d)");});
  rec.discharges.forEach(d=>{
    if(d.is_sj_recv) evts.push("🔵 "+d.shuttle+"→SanJulian ("+(d.vol/1000).toFixed(0)+"k) [roving]");
    else if(d.is_sj)  evts.push("🔵 SanJulian→"+d.mother+" ("+(d.vol/1000).toFixed(0)+"k) [transload]");
    else if(d.is_sts) evts.push("🔄 STS "+d.shuttle+"→"+d.mother+" ("+(d.vol/1000).toFixed(0)+"k)");
    else              evts.push("⚡ "+d.shuttle+"→"+d.mother+" ("+(d.vol/1000).toFixed(0)+"k)");
  });
  (SBM_D[ds]||[]).forEach(e=>{const icons={departing:"🚢→",at_sbm:"⚓SBM",discharging_sbm:"⬇SBM",returning:"🚢←"};evts.push((icons[e.phase]||"")+" "+e.mother);});
  if(rec.in_transit>0)evts.push("🔵 "+rec.in_transit+" transit");
  document.getElementById("ticker").textContent=evts.join("  ·  ")||"No events";
  const tot=MOTHERS.reduce((s,m)=>{const ms2=rec.mothers[m];return s+(ms2?ms2.stock:0);},0);document.getElementById("daySummary").textContent="Transit:"+( rec.in_transit||0)+"  Stock:"+(tot/1000).toFixed(0)+"k";
}
function renderFrame(){
  tick++;const d=DAILY[day]||null;
  if(activeP==="map-panel"){drawMap(d);}
  else if(activeP==="stock-panel")updateStockGrid(d);
  else if(activeP==="gantt-panel")drawGantt(day);
  MOTHERS.forEach(m=>mFlash[m]=Math.max(0,(mFlash[m]||0)-0.04));
}
function loop(ts){
  if(!playing)return;
  // Initialise lastT on first real frame so we don't skip days
  if(lastT===0) lastT=ts;
  if(ts-lastT>=1200/spd){lastT=ts;day=(day+1)%ND;updateDay(day);}
  renderFrame();
  requestAnimationFrame(loop);
}
function resizeAll(){resizeMap();resizeGantt();if(threeInited&&rend){const W=document.getElementById("tank-panel").clientWidth||800;const H=document.getElementById("tank-panel").clientHeight||500;cam.aspect=W/H;cam.updateProjectionMatrix();rend.setSize(W,H);}}
// ── Deferred init: runs after browser layout is complete ──────────────────
function _init() {
  try {
    buildStockGrid();
    resizeAll();
    initPos();
    updateDay(0);
    renderFrame();
    window.addEventListener("resize", () => { resizeAll(); renderFrame(); });

    // ResizeObserver: re-render whenever panel gets real dimensions
    const panel = document.getElementById("map-panel");
    if (typeof ResizeObserver !== "undefined") {
      const ro = new ResizeObserver(() => { resizeAll(); renderFrame(); });
      ro.observe(panel);
    }

    requestAnimationFrame(loop);
  } catch(e) {
    document.getElementById("ticker").textContent = "ERROR: " + e.message;
    document.getElementById("ticker").style.color = "#f85149";
    document.getElementById("ticker").style.flex = "1";
    const mc2 = document.getElementById("mc");
    if (mc2) {
      const ctx2 = mc2.getContext("2d");
      mc2.width = window.innerWidth; mc2.height = window.innerHeight - 80;
      ctx2.fillStyle = "#0d1117"; ctx2.fillRect(0,0,mc2.width,mc2.height);
      ctx2.fillStyle = "#f85149"; ctx2.font = "bold 14px monospace";
      ctx2.fillText("JS Error: " + e.message, 20, 40);
      ctx2.fillStyle = "#8b949e"; ctx2.font = "11px monospace";
      const lines = (e.stack||"").split("\n").slice(0,8);
      lines.forEach((line,i) => ctx2.fillText(line, 20, 70 + i*18));
    }
    console.error("sim3d init error:", e);
  }
}

// Use multiple strategies to ensure init runs after layout:
// 1. DOMContentLoaded (in case script runs before DOM is ready)
// 2. requestAnimationFrame after load (gives browser a paint cycle)
// 3. setTimeout fallback (Streamlit iframe sometimes delays layout)
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", () => requestAnimationFrame(() => setTimeout(_init, 50)));
} else {
  // DOM already loaded — still defer one frame + small timeout
  requestAnimationFrame(() => setTimeout(_init, 50));
}


</script>
